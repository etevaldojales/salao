{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-4" style="border-radius: 15px; border: 1px solid #ccc; padding: 20px; background-color: #f5f5f5; margin-top: 10%;">
        <h2>Login</h2>

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Usuário</label>
                {{ form.username }}
            </div>

            <div class="mb-3">
                <label class="form-label">Senha</label>
                {{ form.password }}
            </div>

            <button type="submit" class="btn btn-primary w-100">Entrar</button>
        </form>

        <div class="mt-3">
            <a href="{% url 'register' %}">Criar conta</a>
        </div>
    </div>
</div>

{% endblock %}
