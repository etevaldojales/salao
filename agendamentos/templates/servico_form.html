{% extends 'base.html' %}

{% block title %}{% if servico %}Editar Serviço{% else %}Novo Serviço{% endif %}{% endblock %}

{% block content %}
    <h1>{% if servico %}Editar Serviço{% else %}Novo Serviço{% endif %}</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Salvar</button>
        <a href="{% url 'servico_list' %}" class="btn btn-secondary">Cancelar</a>
    </form>
{% endblock %}
