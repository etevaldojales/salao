{% extends 'base.html' %}

{% block title %}Cadastro{% endblock %}

{% block content %}

<div class="row justify-content-center" 
style="border-radius: 15px; border: 1px solid #ccc; padding: 20px; background-color: #f5f5f5;  width: 30%; margin: 0 auto;">
    <div class="col-md-8">
        <h2>Criar Conta</h2>

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Usuário</label>
                {{ form.username }}
            </div>

            <div class="mb-3">
                <label class="form-label">Senha</label>
                {{ form.password1 }}
            </div>

            <div class="mb-3">
                <label class="form-label">Confirmar Senha</label>
                {{ form.password2 }}
            </div>

            <button type="submit" class="btn btn-primary w-100">Cadastrar</button>
        </form>

        <div class="mt-3">
            <a href="{% url 'login' %}">Já tenho conta</a>
        </div>
    </div>
</div>

{% endblock %}
