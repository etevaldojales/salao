{% extends 'base.html' %}

{% block content %}
<h2>Relatório de Serviços Concluídos</h2>

<button onclick="carregar()" class="btn btn-primary">Atualizar</button>

<h4 class="mt-3">Total: <span id="total">0</span></h4>

<script>
function carregar() {
    fetch("{% url 'dados_relatorio' %}")
    .then(res => res.json())
    .then(data => {
        document.getElementById('total').textContent = data.total;
    });
}
</script>

{% endblock %}
