{% extends 'base.html' %}

{% block title %}Editar Usuário{% endblock %}

{% block content %}

<h2>Editar Usuário</h2>

<form method="post">
    {% csrf_token %}

    <div class="mb-3">
        <label class="form-label">Username</label>
        {{ form.username }}
    </div>

    <div class="mb-3">
        <label class="form-label">É Admin?</label>
        {{ form.is_staff }}
    </div>

    <button type="submit" class="btn btn-primary">Salvar</button>
</form>

{% endblock %}
